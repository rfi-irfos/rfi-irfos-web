<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var q = window.location.search;
        if (q && q[1] === 'p') {
          var params = q.slice(1).split('&');
          var path = params[0].slice(2).replace(/~and~/g, '&');
          var query = params[1] ? '?' + params[1].slice(2).replace(/~and~/g, '&') : '';
          var hash = window.location.hash || '';
          window.history.replaceState(null, null, window.location.pathname + path + query + hash);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
