<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      if (location.protocol === 'http:' && location.hostname !== 'localhost') {
        location.replace('https:' + location.href.slice(5));
      }
    </script>
    <script>
      (function() {
        var q = window.location.search;
        if (q && q[1] === 'p') {
          var params = q.slice(1).split('&');
          var path = params[0].slice(2).replace(/~and~/g, '&');
          var query = params[1] ? '?' + params[1].slice(2).replace(/~and~/g, '&') : '';
          var hash = window.location.hash || '';
          window.history.replaceState(null, null, window.location.pathname + path + query + hash);
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RFI-IRFOS - Interdisciplinary Research Facility for Open Sciences</title>
    <meta name="description" content="Regulated Austrian research institute at the intersection of ternary AI, security & privacy, governance, and ecocentric technology. Graz, Austria." />
    <meta property="og:title" content="RFI-IRFOS" />
    <meta property="og:description" content="Interdisciplinary Research Facility for Open Sciences. Ternary AI · Security · Governance · Graz, Austria." />
    <meta property="og:url" content="https://rfi-irfos.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
