    <script>
      (function() {
        var q = window.location.search;
        if (q && q[1] === 'p') {
          var params = q.slice(1).split('&');
          var path = params[0].slice(2).replace(/~and~/g, '&');
          var query = params[1] ? '?' + params[1].slice(2).replace(/~and~/g, '&') : '';
          var hash = window.location.hash || '';
          window.history.replaceState(null, null, window.location.pathname + path + query + hash);
        }
      })();
    </script>
