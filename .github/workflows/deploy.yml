name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GH_OWNER:        ${{ secrets.VITE_GH_OWNER }}
          VITE_GH_REPO:         ${{ secrets.VITE_GH_REPO }}
          VITE_GH_TOKEN:        ${{ secrets.VITE_GH_TOKEN }}
          VITE_GH_CONTENT_PATH: ${{ vars.VITE_GH_CONTENT_PATH || 'public/content.json' }}
          VITE_GH_UPLOADS_DIR:  ${{ vars.VITE_GH_UPLOADS_DIR  || 'public/uploads' }}
          VITE_ADMIN_PASSWORD:  ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_WEB3FORMS_KEY:   ${{ secrets.VITE_WEB3FORMS_KEY }}
          VITE_BASE_URL:        ${{ vars.VITE_BASE_URL || '/' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
